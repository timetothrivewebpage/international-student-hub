<footer class="site-footer">
  <div class="container site-footer__inner">
    <nav class="site-footer__links" aria-label="Footer">
      <a href="{{ '/about/' | relative_url }}">About Us</a>
      <a href="{{ '/privacy/' | relative_url }}">Privacy Policy</a>
      <a href="{{ '/terms/' | relative_url }}">Terms of Use</a>
      <a href="{{ '/accessibility/' | relative_url }}">Accessibility</a>
      <a href="{{ '/contact/' | relative_url }}">Contact Us</a>
    </nav>
    <span class="site-footer__divider" aria-hidden="true"></span>
    <ul class="site-footer__social">
      <li><a href="#" aria-label="Facebook">{% include icon.html name="facebook" %}</a></li>
      <li><a href="#" aria-label="Instagram">{% include icon.html name="instagram" %}</a></li>
      <li><a href="#" aria-label="YouTube">{% include icon.html name="youtube" %}</a></li>
    </ul>
  </div>
</footer>
